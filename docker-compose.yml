services:

  nginx-proxy:
    image: nginx-alpine
    volumes:
      - ./nginx/nginx-proxy.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD : ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE : ${DATABASE_NAME}
      MYSQL_USER : ${DATABASE_USER}
      MYSQL_PASSWORD : ${DATABASE_PASSWORD}
    ports:
      - "3306:3306"

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    env_file:
      - .env
    volumes:
      - ./nginx/nginx-react.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend